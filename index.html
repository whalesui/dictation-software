<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>大鲸鱼中英听写</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f5f5f5;color:#333;font-size:16px;line-height:1.5;overflow-x:hidden}
.page{display:none;padding:16px;max-width:600px;margin:0 auto;min-height:100vh;width:100%;overflow-x:hidden}
.page.active{display:flex;flex-direction:column;min-height:100dvh}
h1{font-size:22px;font-weight:bold;text-align:center;margin:16px 0 8px}
h2{font-size:18px;font-weight:bold;margin:12px 0 8px}
.hint{text-align:center;color:#999;font-size:14px;margin-bottom:16px}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 24px;border:none;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;min-height:48px;touch-action:manipulation;user-select:none}
.btn:active{opacity:.8}
.btn, .card-actions .btn{white-space:nowrap}
@media(max-width:420px){
  .page{padding:10px}
  .btn{padding:10px 16px;font-size:15px;min-height:44px}
  .btn-sm{padding:6px 10px;font-size:13px;min-height:30px}
  .textarea{min-height:150px;font-size:15px}
  h1{font-size:20px;margin:10px 0 6px}
  h2{font-size:17px}
  .status-text{font-size:20px;padding:30px 0;min-height:90px}
  .card{padding:10px;margin-bottom:8px}
  .btn-bar{gap:8px;padding:8px 0}
  .card-actions{gap:6px}
  .card-actions .btn{padding:4px 10px;font-size:12px;min-height:28px}
  .setting-row{padding:10px 0}
  .kse{width:120px}
}
.btn-primary{background:#4A90D9;color:#fff}
.btn-green{background:#6AB04C;color:#fff}
.btn-orange{background:#F39C12;color:#fff}
.btn-red{background:#E74C3C;color:#fff}
.btn-purple{background:#8E44AD;color:#fff}
.btn-gray{background:#f0f0f0;color:#555;border:1px solid #ddd}
.btn-sm{padding:8px 16px;font-size:14px;min-height:36px;border-radius:6px}
.btn-block{width:100%}
.btn-bar{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding:12px 0}
.btn-bar .btn{flex:1;min-width:0}
.textarea{width:100%;min-height:200px;padding:12px;border:2px solid #ddd;border-radius:10px;font-size:16px;background:#fafafa;resize:vertical;font-family:inherit}
.textarea:focus{border-color:#4A90D9;outline:none;background:#fff}
#page-home .textarea{flex:1;min-height:100px}
#page-review #review-list{flex:1}
#page-edit .textarea{flex:1;min-height:100px}
#page-library #library-list{flex:1}
#page-wrongbook #wrongbook-list{flex:1}
.input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:16px;background:#fafafa}
.input:focus{border-color:#4A90D9;outline:none;background:#fff}
.select{padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:16px;background:#fff}
.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.card-title{font-size:16px;font-weight:bold;color:#333;margin-bottom:4px}
.card-meta{font-size:13px;color:#888}
.card-actions{display:flex;gap:8px;margin-top:10px}
.card-actions{flex-wrap:nowrap}
.card-actions .btn{flex:0;padding:6px 14px;font-size:13px;min-height:32px;border-radius:6px}
.flex{display:flex}
.flex-1{flex:1}
.gap-8{gap:8px}
.gap-12{gap:12px}
.items-center{align-items:center}
.justify-between{justify-content:space-between}
.text-center{text-align:center}
.text-right{text-align:right}
.text-red{color:#E74C3C}
.text-gray{color:#888}
.text-sm{font-size:14px}
.mt-8{margin-top:8px}
.mt-16{margin-top:16px}
.mb-8{margin-bottom:8px}
.mb-16{margin-bottom:16px}
.p-12{padding:12px}
.py-8{padding-top:8px;padding-bottom:8px}
.progress-bar{height:8px;background:#eee;border-radius:4px;overflow:hidden;margin:12px 0}
.progress-fill{height:100%;background:linear-gradient(90deg,#4A90D9,#357ABD);border-radius:4px;transition:width .3s}
.status-text{text-align:center;font-size:24px;color:#999;padding:40px 0;min-height:120px;display:flex;align-items:center;justify-content:center}
.checkbox{width:22px;height:22px;accent-color:#E74C3C;flex-shrink:0}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #eee}
.setting-row:last-child{border:none}
.setting-label{font-size:15px;color:#333}
.empty-state{text-align:center;color:#bbb;padding:40px 0;font-size:16px}
.badge{display:inline-block;background:#E74C3C;color:#fff;border-radius:10px;padding:2px 8px;font-size:12px;font-weight:bold}
.badge-count{margin-left:4px;color:#aaa;font-weight:normal}
.kse{border:1px solid #ddd;border-radius:6px;padding:6px 10px;font-size:14px;min-height:36px;width:140px;background:#fff}
.kse:focus{border-color:#4A90D9;outline:none}
</style>
</head>
<body>
<!-- 首页：输入内容 -->
<div id="page-home" class="page active">
<h1>大鲸鱼中英听写</h1>
<div class="hint">每行一个项目，支持中文和英文</div>
<div class="flex items-center gap-8 mb-16">
<label style="font-size:14px">语言：</label>
<select id="lang" class="select"><option value="zh">中文</option><option value="en">English</option></select>
</div>
<textarea id="input-text" class="textarea" placeholder="输入听写内容，每行一项"></textarea>
<div class="btn-bar mt-16">
<button class="btn btn-green" onclick="saveToLibrary()">保存</button>
<button class="btn btn-orange" onclick="showLibrary()">听写库</button>
<button class="btn btn-red" onclick="showWrongbook()">错题本</button>
</div>
<button class="btn btn-primary btn-block mt-8" onclick="startDictation()">开始听写</button>
<button class="btn btn-gray btn-block mt-8" onclick="showSettings()">听写设置</button>
</div>
<!-- 听写页面 -->
<div id="page-dictation" class="page">
<h2 id="dict-progress-label">准备就绪</h2>
<div class="progress-bar"><div id="dict-progress-fill" class="progress-fill" style="width:0%"></div></div>
<div id="dict-status" class="status-text">点击下方开始</div>
<div class="btn-bar">
<button class="btn btn-gray" onclick="backHome()">返回</button>
<button class="btn btn-purple" onclick="checkNow()">检查</button>
<button class="btn btn-green" id="btn-repeat" onclick="repeatItem()">朗读</button>
<button class="btn btn-primary" id="btn-next" onclick="nextItem()">下一个</button>
</div>
</div>
<!-- 检查页面 -->
<div id="page-review" class="page">
<h2>听写检查</h2>
<div class="hint">在写错的词前打钩</div>
<div id="review-count" class="text-center text-red" style="font-weight:bold;font-size:15px;margin-bottom:12px">已选 0 个错误</div>
<div id="review-list"></div>
<div class="btn-bar mt-16">
<button class="btn btn-gray" onclick="backHome()">返回</button>
<button class="btn btn-red" id="btn-save-wrong" onclick="saveWrongbook()" disabled>保存到错题本</button>
</div>
</div>
<!-- 听写库页面 -->
<div id="page-library" class="page">
<h2>听写库</h2>
<div class="flex gap-8 mb-8">
<button class="btn btn-purple btn-sm" onclick="toggleMerge('library')">多选合并</button>
<button class="btn btn-gray btn-sm" onclick="backHome()">返回</button>
</div>
<div id="library-list"></div>
<div id="merge-bar-lib" class="btn-bar" style="display:none">
<button class="btn btn-purple btn-block" id="btn-merge-lib" onclick="startMerge('library')" disabled>开始合并听写</button>
</div>
</div>
<!-- 错题本页面 -->
<div id="page-wrongbook" class="page">
<h2>错题本</h2>
<div class="flex gap-8 mb-8">
<button class="btn btn-purple btn-sm" onclick="toggleMerge('wrongbook')">多选合并</button>
<button class="btn btn-gray btn-sm" onclick="backHome()">返回</button>
</div>
<div id="wrongbook-list"></div>
<div id="merge-bar-wb" class="btn-bar" style="display:none">
<button class="btn btn-purple btn-block" id="btn-merge-wb" onclick="startMerge('wrongbook')" disabled>开始合并听写</button>
</div>
</div>
<!-- 设置页面 -->
<div id="page-settings" class="page">
<h2>听写设置</h2>
<div class="card">
<div class="setting-row"><span class="setting-label">朗读次数</span><input id="set-read-times" type="number" min="1" max="5" class="input" style="width:70px"></div>
<div class="setting-row"><span class="setting-label">朗读间隔</span><div class="flex items-center gap-8"><input id="set-interval" type="range" min="200" max="3000" step="100" style="width:120px"><span id="set-interval-label" class="text-sm text-gray" style="width:50px">800ms</span></div></div>
<div class="setting-row"><span class="setting-label">语言模式</span><select id="set-lang" class="select"><option value="zh">中文</option><option value="en">English</option></select></div>
<div class="setting-row"><span class="setting-label">随机顺序</span><input id="set-random" type="checkbox" class="checkbox" style="width:22px;height:22px"></div>
<div class="setting-row"><span class="setting-label">显示原文</span><input id="set-show-text" type="checkbox" class="checkbox" style="width:22px;height:22px"></div>
<div class="setting-row"><span class="setting-label">自动播放下一个</span><input id="set-auto" type="number" min="0" max="30" class="input" style="width:70px"><span class="text-sm text-gray ml-8">秒(0=手动)</span></div>
</div>
<div class="btn-bar"><button class="btn btn-gray" onclick="showPage('page-home')">取消</button><button class="btn btn-primary" onclick="saveSettings()">保存</button></div>
</div>
<!-- 编辑对话框 -->
<div id="page-edit" class="page">
<h2>编辑内容</h2>
<div class="mb-8"><label style="font-size:14px">标题</label></div>
<input id="edit-title" class="input mb-16" placeholder="输入标题">
<div class="mb-8"><label style="font-size:14px">语言</label></div>
<select id="edit-lang" class="select mb-16"><option value="zh">中文</option><option value="en">English</option></select>
<div class="mb-8"><label style="font-size:14px">内容（每行一项）</label></div>
<textarea id="edit-text" class="textarea" style="min-height:150px"></textarea>
<div class="btn-bar"><button class="btn btn-gray" onclick="cancelEdit()">取消</button><button class="btn btn-primary" onclick="saveEdit()">保存</button></div>
</div>
<script>
// ========== 数据存储 ==========
const Store = {
  get(key, def) { try { const d = localStorage.getItem('wd_'+key); return d ? JSON.parse(d) : def } catch(e) { return def } },
  set(key, val) { localStorage.setItem('wd_'+key, JSON.stringify(val)) }
};
const Config = { get(k, d) { const c = Store.get('config',{}); return k? (c[k]??d) : c }, set(k, v) { const c = Config.get(); c[k]=v; Store.set('config',c) } };
const Lib = { all() { return Store.get('library',[]).sort((a,b)=>b.created_at.localeCompare(a.created_at)) },
  get(id) { return Lib.all().find(s=>s.id===id) },
  save(t,i,l) { const s={id:Date.now().toString(36),title:t,created_at:new Date().toISOString().slice(0,19).replace('T',' '),language:l,item_count:i.length,items:i}; const a=Store.get('library',[]); a.unshift(s); Store.set('library',a); return s.id },
  update(id,t,i,l) { const a=Store.get('library',[]); const s=a.find(s=>s.id===id); if(s){s.title=t;s.items=i;s.item_count=i.length;s.language=l;Store.set('library',a);return true}return false },
  del(id) { const a=Store.get('library',[]).filter(s=>s.id!==id); Store.set('library',a) }
};
const WB = { all() { return Store.get('wrongbook',[]).sort((a,b)=>b.created_at.localeCompare(a.created_at)) },
  get(id) { return WB.all().find(s=>s.id===id) },
  save(t,i,l) { const s={id:Date.now().toString(36),title:t,created_at:new Date().toISOString().slice(0,19).replace('T',' '),language:l,item_count:i.length,items:i}; const a=Store.get('wrongbook',[]); a.unshift(s); Store.set('wrongbook',a); return s.id },
  update(id,t,i,l) { const a=Store.get('wrongbook',[]); const s=a.find(s=>s.id===id); if(s){s.title=t;s.items=i;s.item_count=i.length;s.language=l;Store.set('wrongbook',a);return true}return false },
  del(id) { const a=Store.get('wrongbook',[]).filter(s=>s.id!==id); Store.set('wrongbook',a) }
};

// ========== 语音引擎 ==========
let speechSynth = window.speechSynthesis;
let currentUtterance = null;
function speakText(text, lang, onEnd) {
  speechSynth.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang === 'zh' ? 'zh-CN' : 'en-US';
  u.rate = 0.85;
  u.pitch = 1;
  u.volume = 1;
  currentUtterance = u;
  if (onEnd) u.onend = onEnd;
  u.onerror = () => { if (onEnd) onEnd() };
  speechSynth.speak(u);
}

// ========== 应用状态 ==========
const App = {
  items: [], lang: 'zh', config: {},
  currentIdx: 0, readCount: 0, dictating: false,
  mergeSource: '', mergeIds: [],
  editSource: '', editId: '',
  reviewItems: [], reviewLang: '',
  currentTitle: ''
};

// ========== 页面切换 ==========
function showPage(id) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active') }
function backHome() { speechSynth.cancel(); App.dictating=false; App.mergeSource=''; App.mergeIds=[]; showPage('page-home') }

// ========== 设置 ==========
function showSettings() {
  const c = Config.get();
  document.getElementById('set-read-times').value = c.read_times || 1;
  document.getElementById('set-interval').value = c.read_interval || 800;
  document.getElementById('set-interval-label').textContent = (c.read_interval || 800) + 'ms';
  document.getElementById('set-lang').value = c.language_mode || 'zh';
  document.getElementById('set-random').checked = c.random_order || false;
  document.getElementById('set-show-text').checked = c.show_text_in_dictation || false;
  document.getElementById('set-auto').value = c.auto_advance_interval || 0;
  showPage('page-settings');
}
function saveSettings() {
  Config.set('read_times', parseInt(document.getElementById('set-read-times').value)||1);
  Config.set('read_interval', parseInt(document.getElementById('set-interval').value)||800);
  Config.set('language_mode', document.getElementById('set-lang').value);
  Config.set('random_order', document.getElementById('set-random').checked);
  Config.set('show_text_in_dictation', document.getElementById('set-show-text').checked);
  Config.set('auto_advance_interval', parseInt(document.getElementById('set-auto').value)||0);
  document.getElementById('lang').value = Config.get('language_mode','zh');
  backHome();
}
document.getElementById('set-interval').addEventListener('input', function() {
  document.getElementById('set-interval-label').textContent = this.value + 'ms';
});

// ========== 保存到听写库 ==========
function saveToLibrary() {
  const text = document.getElementById('input-text').value.trim();
  if (!text) { alert('请输入听写内容'); return }
  const items = text.split('\n').map(s=>s.trim()).filter(Boolean);
  if (!items.length) { alert('请输入听写内容'); return }
  const title = prompt('输入标题：');
  if (!title || !title.trim()) return;
  Lib.save(title.trim(), items, document.getElementById('lang').value);
  alert('已保存到听写库');
}

// ========== 开始听写 ==========
function startDictation() {
  const text = document.getElementById('input-text').value.trim();
  if (!text) { alert('请输入听写内容'); return }
  let items = text.split('\n').map(s=>s.trim()).filter(Boolean);
  if (!items.length) { alert('请输入听写内容'); return }
  App.lang = document.getElementById('lang').value;
  App.config = Config.get();
  App.currentTitle = '';
  if (App.config.random_order) items.sort(() => Math.random() - 0.5);
  App.items = items;
  App.currentIdx = 0;
  App.readCount = 0;
  App.dictating = true;
  showPage('page-dictation');
  playCurrent();
}

// ========== 听写播放逻辑 ==========
function playCurrent() {
  if (App.currentIdx >= App.items.length) { finishDictation(); return }
  document.getElementById('dict-progress-fill').style.width = (App.currentIdx / App.items.length * 100) + '%';
  document.getElementById('dict-progress-label').textContent = `第 ${App.currentIdx+1} / ${App.items.length} 个`;
  document.getElementById('dict-status').textContent = '朗读中…';
  document.getElementById('btn-repeat').disabled = true;
  document.getElementById('btn-next').disabled = true;
  const text = App.items[App.currentIdx];
  speakText(text, App.lang, () => onReadComplete());
}
function onReadComplete() {
  App.readCount++;
  const times = App.config.read_times || 1;
  if (App.readCount < times) {
    const interval = App.config.read_interval || 800;
    setTimeout(() => { if (App.dictating) playCurrent() }, interval);
    document.getElementById('dict-status').textContent = `间隔中…(${App.readCount}/${times})`;
  } else {
    enterWaiting();
  }
}
function enterWaiting() {
  App.currentIdx++;
  document.getElementById('dict-progress-fill').style.width = (App.currentIdx / App.items.length * 100) + '%';
  document.getElementById('dict-progress-label').textContent = `第 ${App.currentIdx} / ${App.items.length} 个`;
  document.getElementById('dict-status').textContent = App.currentIdx >= App.items.length ? '听写完成！' : '请写答案';
  document.getElementById('btn-repeat').disabled = App.currentIdx >= App.items.length;
  document.getElementById('btn-next').disabled = App.currentIdx >= App.items.length;
  if (App.currentIdx >= App.items.length) { finishDictation(); return }
  const auto = App.config.auto_advance_interval || 0;
  if (auto > 0) setTimeout(() => { if (App.dictating && App.currentIdx < App.items.length) nextItem() }, auto * 1000);
}
function nextItem() {
  if (!App.dictating || App.currentIdx >= App.items.length) return;
  speechSynth.cancel();
  App.readCount = 0;
  playCurrent();
}
function repeatItem() {
  if (!App.dictating || App.currentIdx >= App.items.length) return;
  speechSynth.cancel();
  App.readCount = 0;
  playCurrent();
}
function finishDictation() {
  App.dictating = false;
  document.getElementById('dict-status').textContent = '听写完成！';
  document.getElementById('btn-repeat').disabled = true;
  document.getElementById('btn-next').disabled = true;
  App.reviewItems = [...App.items];
  App.reviewLang = App.lang;
  setTimeout(() => showReview(), 800);
}

// ========== 中途检查 ==========
function checkNow() {
  speechSynth.cancel();
  App.dictating = false;
  App.reviewItems = [...App.items];
  App.reviewLang = App.lang;
  showReview();
}

// ========== 检查页面 ==========
function showReview() {
  const list = document.getElementById('review-list');
  list.innerHTML = '';
  App.reviewCheck = {};
  let html = '';
  App.reviewItems.forEach((item, i) => {
    html += `<div class="card" style="display:flex;align-items:center;gap:12px;padding:10px 14px"><input type="checkbox" class="checkbox" data-idx="${i}" onchange="updateReviewCount()"><span style="font-size:17px">${i+1}. ${item}</span></div>`;
  });
  list.innerHTML = html;
  document.getElementById('review-count').textContent = '已选 0 个错误';
  document.getElementById('btn-save-wrong').disabled = true;
  showPage('page-review');
}
function updateReviewCount() {
  const cbs = document.querySelectorAll('#review-list .checkbox:checked');
  document.getElementById('review-count').textContent = `已选 ${cbs.length} 个错误`;
  document.getElementById('btn-save-wrong').disabled = cbs.length === 0;
}
function saveWrongbook() {
  const cbs = document.querySelectorAll('#review-list .checkbox:checked');
  const wrong = [];
  cbs.forEach(cb => { const idx = parseInt(cb.dataset.idx); if (!isNaN(idx) && idx < App.reviewItems.length) wrong.push(App.reviewItems[idx]) });
  if (!wrong.length) return;
  const now = new Date();
  const dateStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
  const defTitle = App.currentTitle ? `${dateStr} 错题(${wrong.length}项) - ${App.currentTitle}` : `${dateStr} 错题(${wrong.length}项)`;
  const title = prompt('错题本标题：', defTitle);
  const finalTitle = (title && title.trim()) ? title.trim() : defTitle;
  if (finalTitle) {
    WB.save(finalTitle, wrong, App.reviewLang);
    alert(`已保存 ${wrong.length} 个错题到错题本`);
    backHome();
  }
}

// ========== 听写库 ==========
let libMergeMode = false;
function showLibrary() { libMergeMode = false; renderLibrary(); showPage('page-library') }
function renderLibrary() {
  const list = document.getElementById('library-list');
  const sessions = Lib.all();
  list.innerHTML = '';
  if (!sessions.length) { list.innerHTML = '<div class="empty-state">还没有保存的听写记录</div>'; return }
  sessions.forEach(s => {
    const checked = libMergeMode ? `<input type="checkbox" class="checkbox" data-id="${s.id}" onchange="updateMergeBtn('lib')" style="margin-right:8px">` : '';
    list.innerHTML += `<div class="card">${checked}<div class="card-title">${s.title}</div><div class="card-meta">${s.created_at} | ${s.language==='zh'?'中文':'English'} | ${s.item_count}项</div><div class="card-actions"><button class="btn btn-sm" style="color:#c0392b;border:1px solid #e74c3c;background:transparent" onclick="delLib('${s.id}')">删除</button><button class="btn btn-sm" style="color:#2980b9;border:1px solid #3498db;background:transparent" onclick="editLib('${s.id}')">编辑</button>${libMergeMode?'':`<button class="btn btn-sm btn-primary" onclick="startFromLib('${s.id}')">开始听写</button>`}</div></div>`;
  });
}
function startFromLib(id) {
  const s = Lib.get(id); if (!s) return;
  document.getElementById('input-text').value = s.items.join('\n');
  document.getElementById('lang').value = s.language;
  App.currentTitle = s.title;
  showPage('page-home');
  startDictation();
}
function delLib(id) { if (confirm('确定删除？')) { Lib.del(id); renderLibrary() } }
function editLib(id) {
  const s = Lib.get(id); if (!s) return;
  App.editSource = 'lib'; App.editId = id;
  document.getElementById('edit-title').value = s.title;
  document.getElementById('edit-lang').value = s.language;
  document.getElementById('edit-text').value = s.items.join('\n');
  showPage('page-edit');
}

// ========== 听写库 & 错题本合并 ==========
function toggleMerge(src) {
  if (src === 'library') { libMergeMode = !libMergeMode; renderLibrary(); document.getElementById('merge-bar-lib').style.display = libMergeMode ? 'flex' : 'none' }
  else { wbMergeMode = !wbMergeMode; renderWrongbook(); document.getElementById('merge-bar-wb').style.display = wbMergeMode ? 'flex' : 'none' }
}
function updateMergeBtn(src) {
  const cbs = document.querySelectorAll(src==='lib'?'#library-list .checkbox:checked':'#wrongbook-list .checkbox:checked');
  const btn = document.getElementById(src==='lib'?'btn-merge-lib':'btn-merge-wb');
  btn.textContent = `开始合并听写（${cbs.length}项）`;
  btn.disabled = cbs.length === 0;
}
function startMerge(src) {
  const sel = src==='lib'?'#library-list .checkbox:checked':'#wrongbook-list .checkbox:checked';
  const cbs = document.querySelectorAll(sel);
  if (!cbs.length) return;
  const allItems = []; const titles = []; let lang = 'zh';
  cbs.forEach(cb => {
    const data = src==='lib' ? Lib.get(cb.dataset.id) : WB.get(cb.dataset.id);
    if (data) {
      if (!titles.length) lang = data.language;
      titles.push(data.title);
      data.items.forEach(i => allItems.push(i));
    }
  });
  const mergedTitle = titles.length <= 3 ? titles.join(' + ') : `合并听写（${allItems.length}项）`;
  src==='lib'?libMergeMode=false:wbMergeMode=false;
  document.getElementById('input-text').value = allItems.join('\n');
  document.getElementById('lang').value = lang;
  App.currentTitle = mergedTitle;
  showPage('page-home');
  startDictation();
}

// ========== 错题本 ==========
let wbMergeMode = false;
function showWrongbook() { wbMergeMode = false; renderWrongbook(); showPage('page-wrongbook') }
function renderWrongbook() {
  const list = document.getElementById('wrongbook-list');
  const sessions = WB.all();
  list.innerHTML = '';
  if (!sessions.length) { list.innerHTML = '<div class="empty-state">还没有错题记录</div>'; return }
  sessions.forEach(s => {
    const checked = wbMergeMode ? `<input type="checkbox" class="checkbox" data-id="${s.id}" onchange="updateMergeBtn('wb')" style="margin-right:8px">` : '';
    list.innerHTML += `<div class="card">${checked}<div class="card-title" style="color:#c0392b">${s.title}</div><div class="card-meta">${s.created_at} | ${s.language==='zh'?'中文':'English'} | ${s.item_count}项</div><div class="card-actions"><button class="btn btn-sm" style="color:#c0392b;border:1px solid #e74c3c;background:transparent" onclick="delWb('${s.id}')">删除</button><button class="btn btn-sm" style="color:#2980b9;border:1px solid #3498db;background:transparent" onclick="editWb('${s.id}')">编辑</button>${wbMergeMode?'':`<button class="btn btn-sm btn-red" onclick="startFromWb('${s.id}')">开始听写</button>`}</div></div>`;
  });
}
function startFromWb(id) {
  const s = WB.get(id); if (!s) return;
  document.getElementById('input-text').value = s.items.join('\n');
  document.getElementById('lang').value = s.language;
  App.currentTitle = s.title;
  showPage('page-home');
  startDictation();
}
function delWb(id) { if (confirm('确定删除？')) { WB.del(id); renderWrongbook() } }
function editWb(id) {
  const s = WB.get(id); if (!s) return;
  App.editSource = 'wb'; App.editId = id;
  document.getElementById('edit-title').value = s.title;
  document.getElementById('edit-lang').value = s.language;
  document.getElementById('edit-text').value = s.items.join('\n');
  showPage('page-edit');
}

// ========== 编辑对话框 ==========
function cancelEdit() { backHome() }
function saveEdit() {
  const title = document.getElementById('edit-title').value.trim();
  const text = document.getElementById('edit-text').value.trim();
  const items = text.split('\n').map(s=>s.trim()).filter(Boolean);
  const lang = document.getElementById('edit-lang').value;
  if (!title || !items.length) { alert('标题和内容不能为空'); return }
  if (App.editSource === 'lib') { Lib.update(App.editId, title, items, lang); renderLibrary(); showPage('page-library') }
  else if (App.editSource === 'wb') { WB.update(App.editId, title, items, lang); renderWrongbook(); showPage('page-wrongbook') }
}

// ========== 初始化 ==========
document.getElementById('lang').value = Config.get('language_mode','zh');
console.log('大鲸鱼中英听写 V1.0 加载完成');
</script>
